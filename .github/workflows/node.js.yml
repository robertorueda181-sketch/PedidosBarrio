name: Deploy Angular App (Manual)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Construir proyecto (Producción)
        run: npm run build --configuration=production

      - name: Desplegar archivos al servidor
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Cambia "dist/tu-proyecto" por el nombre real que genera Angular
          source: "dist/PedidosBarrio/*"
          target: "/var/www/EspacioOnline"
          strip_components: 2 # Esto evita que se cree la carpeta 'dist/proyecto' en el servidor
