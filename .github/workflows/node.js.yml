name: Deploy to VPS

on:
  push:
    branches:
      - main # Cambia esto si tu rama principal se llama de otra forma, por ejemplo 'master'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Puedes cambiar a la versión de Node.js que utilices
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci || npm install

      - name: Construir la aplicación (Build)
        run: npm run build
        # Por defecto, Angular 17+ genera los archivos en 'dist/PedidosBarrio/browser'
        # Si usas una versión anterior puede ser solo 'dist/PedidosBarrio'

      - name: Desplegar en el servidor VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "dist/PedidosBarrio/browser/*"
          target: "/var/www/html/tu-app" # Ruta de destino en tu servidor VPS
          strip_components: 3 # Esto elimina la estructura de carpetas inicial "dist/PedidosBarrio/browser" al copiar
