name: Deploy to VPS

on:
  push:
    branches:
      - develop # Se ejecutará cuando hagas push a la rama develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Usando la misma versión que tienes localmente (v24.x)

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Construir la aplicación (Build)
        run: npm run build
        # Por defecto, Angular 17+ genera los archivos en 'dist/PedidosBarrio/browser'
        # Si usas una versión anterior puede ser solo 'dist/PedidosBarrio'

      - name: Desplegar en el servidor VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "dist/PedidosBarrio/browser/*"
          target: "/var/www/html/EspacioOnline" # Ruta de destino en tu servidor VPS
          strip_components: 3 # Esto elimina la estructura de carpetas inicial "dist/PedidosBarrio/browser" al copiar
