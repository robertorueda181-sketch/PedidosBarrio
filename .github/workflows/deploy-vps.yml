name: Deploy to VPS

on:
  push:
    branches:
      - develop # Se ejecutará cuando hagas push a la rama develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Usando la misma versión que tienes localmente (v24.x)

      - name: Instalar dependencias
        run: npm ci --legacy-peer-deps

      - name: Construir la aplicación (Build)
        run: npm run build
        
        # Por defecto, Angular 17+ genera los archivos en 'dist/PedidosBarrio/browser'
        # Si usas una versión anterior puede ser solo 'dist/PedidosBarrio'
      - name: Listar archivos para depuración
        run: |
          echo "Buscando archivos en la raíz..."
          ls -R
          echo "Buscando específicamente en la carpeta dist..."
          ls -R PedidosBarrio/dist || echo "No existe la carpeta PedidosBarrio/dist"
          
      - name: Desplegar en el servidor VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Usamos un comodín doble (**) para que busque los archivos 
          # sin importar el nombre de la carpeta del proyecto
          source: "dist/**/browser/*"
          target: "/var/www/EspacioOnline"
          # strip_components: 3 suele ser el correcto para dist/nombre-proyecto/browser
          # Si tu estructura es PedidosBarrio/dist/... entonces sería 4
          strip_components: 3
          rm: true
