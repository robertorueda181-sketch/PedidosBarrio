<p-dialog header="Seleccionar imagen" [visible]="visible" [modal]="true"
  [style]="{width: '50vw'}" [styleClass]="'image-dialog'" (onHide)="closeDialog()">

  <p-tabs [value]="activeImageTab()" (valueChange)="activeImageTab.set($event === 'catalog' ? 'catalog' : 'upload')">
    <p-tablist>
      <p-tab value="upload">Subir nueva</p-tab>
      <p-tab value="catalog">Catálogo de imágenes</p-tab>
    </p-tablist>

    <p-tabpanels>
      <p-tabpanel value="upload">
        <div class="image-modal-content pt-4">
          <div class="field image-modal-step">
            <label class="block text-sm font-medium text-slate-700 mb-2">Cargar y recortar imagen</label>
            <div class="editor-inline-box border-2 border-dashed border-slate-300 rounded-lg p-6 text-center">
              <div class="file-upload-wrapper">
                <input #fileInput type="file" id="sharedFileInput" accept="image/*"
                  (change)="handleFileInModal($event)" style="display: none;" />
                <label for="sharedFileInput"
                  class="file-upload-label cursor-pointer flex flex-col items-center gap-2">
                  <i class="pi pi-upload text-3xl text-slate-400"></i>
                  <span class="font-medium text-blue-600 hover:text-blue-500">Seleccionar archivo</span>
                  <small class="text-slate-500">PNG, JPG o WEBP</small>
                </label>
              </div>

              @if (imageFile()) {
              <div class="cropper-wrapper mt-4 border border-slate-200 rounded overflow-hidden flex justify-center bg-slate-50">
                <image-cropper [imageFile]="imageFile() || undefined" [maintainAspectRatio]="true" [aspectRatio]="1"
                  [resizeToWidth]="900" format="png" (imageCropped)="imageCropped($event)"
                  (imageLoaded)="imageLoaded($event)" (cropperReady)="cropperReady()"
                  (loadImageFailed)="loadImageFailed()">
                </image-cropper>
              </div>
              }
            </div>
          </div>
        </div>

        <div class="flex justify-end gap-2 mt-4 pt-4 border-t border-slate-100">
          <button pButton type="button" label="Cancelar" severity="secondary" (click)="closeDialog()"></button>
          @if (previewSrc()) {
          <button pButton type="button" label="Guardar imagen" [loading]="uploadingImage()"
            (click)="applyImage()"></button>
          }
        </div>
      </p-tabpanel>

      <p-tabpanel value="catalog">
        <div class="catalog-grid grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4 pt-4">
          @if (catalogImages().length > 0) {
            @for (img of catalogImages(); track img) {
            <div
              class="catalog-item aspect-square rounded-lg border border-slate-200 overflow-hidden cursor-pointer hover:ring-2 hover:ring-blue-500 transition-all bg-white"
              (click)="selectFromCatalog(img)">
              <img [src]="img" class="w-full h-full object-cover" />
            </div>
            }
          } @else {
            <div class="col-span-full py-8 text-center text-slate-500">
              <i class="pi pi-images text-4xl mb-3 text-slate-300"></i>
              <p>No hay imágenes subidas anteriormente.</p>
            </div>
          }
        </div>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</p-dialog>
