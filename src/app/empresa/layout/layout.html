<div class="flex h-screen bg-gray-100">
  <!-- Sidebar -->
  <div class="hidden md:flex md:flex-shrink-0 transition-all duration-300"
    [ngClass]="isSidebarCollapsed ? 'w-20' : 'w-64'">
    <div class="flex flex-col w-full">
      <!-- Sidebar component -->
      <div class="flex flex-col h-0 flex-1 bg-gray-800 shadow-xl">
        <div class="flex items-center flex-shrink-0 px-4 h-16"
          [ngClass]="isSidebarCollapsed ? 'justify-center' : 'justify-between'">
          <h1 class="text-white text-xl font-bold truncate transition-opacity duration-300" *ngIf="!isSidebarCollapsed">
            Panel Empresa</h1>
          <button (click)="toggleSidebar()"
            class="text-gray-400 hover:text-white focus:outline-none p-1 rounded-md hover:bg-gray-700 transition-colors">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>

        <nav class="mt-5 flex-1 px-2 bg-gray-800 space-y-1">
          <!-- Dashboard -->
          <a routerLink="/empresa/dashboard" routerLinkActive="bg-gray-900 text-white"
            class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md transition-colors"
            [title]="isSidebarCollapsed ? 'Dashboard' : ''">
            <svg class="text-gray-400 group-hover:text-gray-300 h-6 w-6 flex-shrink-0 transition-all"
              [ngClass]="isSidebarCollapsed ? 'mr-0 mx-auto' : 'mr-3'" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2H5a2 2 0 00-2-2z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 5a2 2 0 012-2h4a2 2 0 012 2v2H8V5z" />
            </svg>
            <span class="truncate transition-opacity duration-200" [class.opacity-0]="isSidebarCollapsed"
              [class.hidden]="isSidebarCollapsed" [class.w-0]="isSidebarCollapsed">
              Dashboard
            </span>
          </a>

          <!-- Productos -->
          <a routerLink="/empresa/productos" routerLinkActive="bg-gray-900 text-white"
            class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md transition-colors"
            [title]="isSidebarCollapsed ? 'Productos' : ''">
            <svg class="text-gray-400 group-hover:text-gray-300 h-6 w-6 flex-shrink-0 transition-all"
              [ngClass]="isSidebarCollapsed ? 'mr-0 mx-auto' : 'mr-3'" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
            </svg>
            <span class="truncate transition-opacity duration-200" [class.opacity-0]="isSidebarCollapsed"
              [class.hidden]="isSidebarCollapsed" [class.w-0]="isSidebarCollapsed">
              Productos
            </span>
          </a>

          <!-- Inmuebles -->
          <a routerLink="/empresa/inmuebles" routerLinkActive="bg-gray-900 text-white"
            class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md transition-colors"
            [title]="isSidebarCollapsed ? 'Inmuebles' : ''">
            <svg class="text-gray-400 group-hover:text-gray-300 h-6 w-6 flex-shrink-0 transition-all"
              [ngClass]="isSidebarCollapsed ? 'mr-0 mx-auto' : 'mr-3'" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
            </svg>
            <span class="truncate transition-opacity duration-200" [class.opacity-0]="isSidebarCollapsed"
              [class.hidden]="isSidebarCollapsed" [class.w-0]="isSidebarCollapsed">
              Inmuebles
            </span>
          </a>

          <!-- Oficios -->
          <a routerLink="/empresa/oficios" routerLinkActive="bg-gray-900 text-white"
            class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md transition-colors"
            [title]="isSidebarCollapsed ? 'Oficios' : ''">
            <svg class="text-gray-400 group-hover:text-gray-300 h-6 w-6 flex-shrink-0 transition-all"
              [ngClass]="isSidebarCollapsed ? 'mr-0 mx-auto' : 'mr-3'" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span class="truncate transition-opacity duration-200" [class.opacity-0]="isSidebarCollapsed"
              [class.hidden]="isSidebarCollapsed" [class.w-0]="isSidebarCollapsed">
              Oficios
            </span>
          </a>

          <!-- Suscripción -->
          <a routerLink="/empresa/suscripcion" routerLinkActive="bg-gray-900 text-white"
            class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md transition-colors"
            [title]="isSidebarCollapsed ? 'Suscripción' : ''">
            <svg class="text-gray-400 group-hover:text-gray-300 h-6 w-6 flex-shrink-0 transition-all"
              [ngClass]="isSidebarCollapsed ? 'mr-0 mx-auto' : 'mr-3'" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span class="truncate transition-opacity duration-200" [class.opacity-0]="isSidebarCollapsed"
              [class.hidden]="isSidebarCollapsed" [class.w-0]="isSidebarCollapsed">
              Suscripción
            </span>
          </a>

          <!-- Perfil -->
          <a routerLink="/empresa/perfil" routerLinkActive="bg-gray-900 text-white"
            class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md transition-colors"
            [title]="isSidebarCollapsed ? 'Perfil' : ''">
            <svg class="text-gray-400 group-hover:text-gray-300 h-6 w-6 flex-shrink-0 transition-all"
              [ngClass]="isSidebarCollapsed ? 'mr-0 mx-auto' : 'mr-3'" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <span class="truncate transition-opacity duration-200" [class.opacity-0]="isSidebarCollapsed"
              [class.hidden]="isSidebarCollapsed" [class.w-0]="isSidebarCollapsed">
              Perfil
            </span>
          </a>

          <!-- Mi Sitio -->
          <a routerLink="/empresa/sitio" routerLinkActive="bg-gray-900 text-white"
            class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md transition-colors"
            [title]="isSidebarCollapsed ? 'Mi Sitio' : ''">
            <svg class="text-gray-400 group-hover:text-gray-300 h-6 w-6 flex-shrink-0 transition-all"
              [ngClass]="isSidebarCollapsed ? 'mr-0 mx-auto' : 'mr-3'" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />
            </svg>
            <span class="truncate transition-opacity duration-200" [class.opacity-0]="isSidebarCollapsed"
              [class.hidden]="isSidebarCollapsed" [class.w-0]="isSidebarCollapsed">
              Mi Sitio
            </span>
          </a>
        </nav>

        <div class="flex-shrink-0 flex bg-gray-700 p-4" [ngClass]="isSidebarCollapsed ? 'justify-center' : ''">
          <button class="text-gray-300 hover:text-white transition-colors" (click)="logout()"
            [title]="isSidebarCollapsed ? 'Cerrar Sesión' : ''">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            <span class="ml-3" *ngIf="!isSidebarCollapsed">Cerrar Sesión</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="flex flex-col w-0 flex-1 overflow-hidden">
    <main class="flex-1 relative overflow-y-auto focus:outline-none">
      <div class="py-6 h-full">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 md:px-8 h-full">
          <router-outlet></router-outlet>
        </div>
      </div>
    </main>
  </div>
</div>
