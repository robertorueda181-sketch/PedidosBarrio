<div class="space-y-6">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-semibold text-gray-900">Gestión de Inmuebles</h1>
      <p class="text-sm text-gray-500 mt-1">
        Consumo: <span class="font-medium">{{ properties.length }}</span> / 1 (Plan Gratuito)
      </p>
    </div>
    <button [disabled]="properties.length >= 1"
      class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 disabled:opacity-50 disabled:cursor-not-allowed"
      [title]="properties.length >= 1 ? 'Has alcanzado el límite de inmuebles del plan gratuito' : ''">
      <svg class="-ml-1 mr-2 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
      </svg>
      Agregar Inmueble
    </button>
  </div>

  <!-- Properties Grid -->
  <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
    <div *ngFor="let property of properties" class="bg-white overflow-hidden shadow rounded-lg property-card">
      <div class="relative">
        <div class="w-full h-48 property-image flex items-center justify-center">
          <svg class="w-12 h-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
          </svg>
        </div>
        <div class="absolute top-2 right-2">
          <span class="inline-flex px-2 py-1 text-xs font-semibold rounded-full status-badge"
            [class]="property.available ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'">
            {{ property.available ? 'Disponible' : 'Ocupado' }}
          </span>
        </div>
      </div>
      <div class="p-6">
        <div class="flex items-center justify-between">
          <h3 class="text-lg font-medium text-gray-900">{{ property.title }}</h3>
          <p class="text-lg font-medium text-gray-900">${{ property.price | number }}</p>
        </div>
        <p class="mt-2 text-sm text-gray-600">{{ property.address }}</p>
        <div class="mt-4 flex items-center justify-between">
          <div class="flex items-center space-x-4 text-sm text-gray-500">
            <span>{{ property.bedrooms }} hab</span>
            <span>{{ property.bathrooms }} baños</span>
            <span>{{ property.area }}m²</span>
          </div>
          <div class="flex space-x-2">
            <button class="btn-edit text-indigo-600 hover:text-indigo-900 text-sm font-medium">Editar</button>
            <button class="btn-delete text-red-600 hover:text-red-900 text-sm font-medium">Eliminar</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
