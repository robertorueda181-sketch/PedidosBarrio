<div class="p-2 md:p-4">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <!-- Columna de Imagen -->
    <div class="col-span-1">
      <label class="block text-900 font-medium mb-2">
        <i class="pi pi-image mr-2"></i>Imagen
      </label>
      <div style="width: 100%; height: auto; min-height: 150px;">
        <div style="min-height: 150px;" class="w-full h-full border-2 border-dashed rounded-lg flex items-center justify-center hover:border-primary transition-colors cursor-pointer overflow-hidden"
             (click)="openImageModal.emit()">
          @if (!productForm.image) {
            <div class="text-center p-2">
              <i class="pi pi-cloud-upload text-4xl text-400 mb-2 block"></i>
              <small class="text-500">Cargar imagen</small>
            </div>
          } @else {
            <img [src]="productForm.image" alt="Preview" class="w-full h-full object-cover">
          }
        </div>
        @if (productForm.image) {
          <div class="flex gap-2 mt-2">
            <button 
              pButton 
              icon="pi pi-pencil" 
              class="p-button-text p-button-sm flex-1"
              pTooltip="Editar imagen"
              (click)="openImageModal.emit()">
            </button>
            <button 
              pButton 
              icon="pi pi-trash" 
              class="p-button-text p-button-danger p-button-sm flex-1"
              pTooltip="Eliminar imagen"
              (click)="deleteImage.emit()">
            </button>
          </div>
        }
      </div>
    </div>

    <!-- Columna de Campos del formulario -->
    <div class="col-span-1 md:col-span-2">
      <div class="mb-3">
        <label class="block text-900 font-medium mb-2">
          <i class="pi pi-tag mr-2"></i>Nombre del producto *
        </label>
        <input 
          pInputText 
          [(ngModel)]="productForm.name" 
          placeholder="Ej: Pizza Margarita"
          class="w-full">
      </div>

      <div class="mb-3">
        <label class="block text-900 font-medium mb-2">
          <i class="pi pi-folder mr-2"></i>Categoría *
        </label>
        <p-select 
          [(ngModel)]="productForm.categoryId" 
          [options]="categories"
          optionLabel="name"
          optionValue="id"
          placeholder="Selecciona una categoría"
          [showClear]="true"
          class="w-full">
        </p-select>
      </div>

      <div class="mb-3">
        <label class="block text-900 font-medium mb-2">
          <i class="pi pi-align-left mr-2"></i>Descripción
        </label>
        <textarea 
          pInputTextarea
          [(ngModel)]="productForm.description" 
          placeholder="Describe tu producto para que tus clientes sepan qué esperar"
          [rows]="4"
          class="w-full">
        </textarea>
      </div>
    </div>
  </div>

  <!-- Opciones de configuración -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-4">
    <div class="col-span-1">
      <div class="surface-card rounded-lg p-3 h-full">
        <div class="flex items-center gap-3">
          <p-checkbox 
            [(ngModel)]="productForm.active" 
            [binary]="true" 
            inputId="active">
          </p-checkbox>
          <label for="active" class="cursor-pointer flex-1">
            <div class="text-900 font-semibold">
              <i class="pi pi-eye text-green-500 mr-2"></i>Producto Activo
            </div>
            <small class="text-600">Visible para clientes</small>
          </label>
        </div>
      </div>
    </div>

    <div class="col-span-1">
      <div class="surface-card rounded-lg p-3 h-full">
        <div class="flex items-center gap-3">
          <p-toggleswitch 
            [(ngModel)]="productForm.hasStockControl" 
            inputId="stockControl">
          </p-toggleswitch>
          <label for="stockControl" class="cursor-pointer flex-1">
            <div class="text-900 font-semibold">
              <i class="pi pi-box mr-2 text-blue-500"></i>Control de Inventario
            </div>
            <small class="text-600">Llevar registro de stock</small>
          </label>
        </div>
      </div>
    </div>
  </div>

  <!-- Stock Mínimo (solo si el control de inventario está activo) -->
  @if (productForm.hasStockControl) {
    <div class="surface-card rounded-lg p-4 mt-3">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-2">
            <label class="text-900 font-semibold m-0">
              <i class="pi pi-exclamation-triangle mr-2 text-orange-500"></i>Stock Mínimo
            </label>
            <button 
              pButton 
              icon="pi pi-question-circle" 
              class="p-button-rounded p-button-text p-button-sm"
              pTooltip="El stock mínimo es un indicador que te alertará cuando tu producto esté bajo de stock. Cuando las ventas o salidas alcancen este nivel, recibirás una notificación para que puedas reabastecerte a tiempo."
              tooltipPosition="right"
              [escape]="false"
              (click)="showStockInfo.emit()">
            </button>
          </div>
        
        </div>
        <div class="w-full md:w-auto" style="min-width: 200px; max-width: 300px;">
          <p-inputNumber 
            [(ngModel)]="productForm.minStock" 
            [min]="0"
            [showButtons]="true"
            buttonLayout="horizontal"
            incrementButtonIcon="pi pi-plus"
            decrementButtonIcon="pi pi-minus"
            suffix=" unidades"
            styleClass="w-full">
          </p-inputNumber>
        </div>
      </div>
    </div>
  }
