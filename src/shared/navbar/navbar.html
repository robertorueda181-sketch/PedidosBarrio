<!-- Barra superior anuncio -->
<div class="bg-[#1A365D] text-white font-bold p-2 text-center text-sm md:text-base">
  <span class="mx-2">🔈 ¿Tienes un negocio? ¡Regístrate <a class="text-[#96C2DB] hover:underline"
      routerLink="/registro-negocio">Aquí!</a></span>
</div>

<!-- Navbar -->
<nav class="bg-white shadow-md sticky top-0 z-[1000]">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-20">
      <div class="flex items-center space-x-8">
        <!-- Logo -->
        <div class="flex-shrink-0 flex items-center cursor-pointer" routerLink="/">
          <div class="bg-[#1A365D] rounded-full p-1.5 shadow-lg">
            <img src="/assets/logo.png" alt="Pedidos Barrio" class="h-10 w-10 rounded-full object-cover" />
          </div>
          <span class="ml-3 text-xl font-bold text-[#1A365D] hidden sm:block">PedidosBarrio</span>
        </div>

        <!-- Desktop Menu -->
        <div class="hidden md:flex items-center space-x-8">
          <a routerLink="/" routerLinkActive="text-[#1A365D] border-b-2 border-[#1A365D]"
            [routerLinkActiveOptions]="{exact: true}"
            class="text-gray-600 hover:text-[#1A365D] font-semibold transition-colors py-2">Inicio</a>
          <a routerLink="/negocios" routerLinkActive="text-[#1A365D] border-b-2 border-[#1A365D]"
            class="text-gray-600 hover:text-[#1A365D] font-semibold transition-colors py-2">Negocios</a>
          <a routerLink="/servicios" routerLinkActive="text-[#1A365D] border-b-2 border-[#1A365D]"
            class="text-gray-600 hover:text-[#1A365D] font-semibold transition-colors py-2">Servicios</a>
          <a routerLink="/inmueble" routerLinkActive="text-[#1A365D] border-b-2 border-[#1A365D]"
            class="text-gray-600 hover:text-[#1A365D] font-semibold transition-colors py-2">Inmuebles</a>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex items-center space-x-4">
        <div class="relative hidden sm:block">
          <button
            class="bg-[#1A365D] hover:bg-[#7AB0C9] transition-all text-white font-bold px-6 py-2.5 rounded-full shadow-md flex items-center space-x-2"
            (click)="toggleSubmenu()">
            <span>+ Registrar</span>
            <svg class="w-4 h-4 transition-transform duration-200" [class.rotate-180]="isSubmenuOpen" fill="none"
              stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </button>

          <!-- Dropdown Registrar -->
          <div *ngIf="isSubmenuOpen"
            class="absolute right-0 mt-3 w-56 bg-white rounded-2xl shadow-2xl z-[1010] py-2 border border-gray-100 animate-in fade-in slide-in-from-top-2 duration-200">
            <button
              class="w-full text-left px-5 py-3 text-sm text-gray-700 hover:bg-[#E5EDF1] hover:text-[#1A365D] transition-colors flex items-center space-x-3"
              (click)="navigateToRegistro('empresa')">
              <span class="text-xl">🏢</span>
              <div class="flex flex-col">
                <span class="font-bold">Soy empresa</span>
                <span class="text-xs text-gray-500">Registra tu negocio</span>
              </div>
            </button>
            <button
              class="w-full text-left px-5 py-3 text-sm text-gray-700 hover:bg-[#E5EDF1] hover:text-[#1A365D] transition-colors flex items-center space-x-3"
              (click)="navigateToRegistro('cliente')">
              <span class="text-xl">👤</span>
              <div class="flex flex-col">
                <span class="font-bold">Soy cliente</span>
                <span class="text-xs text-gray-500">Busca servicios</span>
              </div>
            </button>
          </div>
        </div>

        <!-- Mobile menu button -->
        <div class="md:hidden flex items-center">
          <button (click)="toggleMenu()" class="text-[#1A365D] p-2 rounded-lg hover:bg-gray-100 transition-colors">
            <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path *ngIf="!isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16" />
              <path *ngIf="isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div *ngIf="isMenuOpen" class="md:hidden bg-white border-t border-gray-100 animate-in slide-in-from-top duration-300">
    <div class="px-4 pt-2 pb-6 space-y-2">
      <a routerLink="/" (click)="isMenuOpen = false"
        class="block px-4 py-3 rounded-xl text-base font-bold text-gray-700 hover:bg-[#E5EDF1] hover:text-[#1A365D] transition-colors">Inicio</a>
      <a routerLink="/negocios" (click)="isMenuOpen = false"
        class="block px-4 py-3 rounded-xl text-base font-bold text-gray-700 hover:bg-[#E5EDF1] hover:text-[#1A365D] transition-colors">Negocios</a>
      <a routerLink="/servicios" (click)="isMenuOpen = false"
        class="block px-4 py-3 rounded-xl text-base font-bold text-gray-700 hover:bg-[#E5EDF1] hover:text-[#1A365D] transition-colors">Servicios</a>
      <a routerLink="/inmueble" (click)="isMenuOpen = false"
        class="block px-4 py-3 rounded-xl text-base font-bold text-gray-700 hover:bg-[#E5EDF1] hover:text-[#1A365D] transition-colors">Inmuebles</a>

      <div class="pt-4 border-t border-gray-100 mt-4">
        <p class="px-4 text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Registrar</p>
        <button (click)="navigateToRegistro('empresa'); isMenuOpen = false"
          class="w-full text-left px-4 py-3 rounded-xl text-base font-bold text-gray-700 hover:bg-[#E5EDF1] hover:text-[#1A365D] transition-colors flex items-center space-x-3">
          <span>🏢</span> <span>Soy empresa</span>
        </button>
        <button (click)="navigateToRegistro('cliente'); isMenuOpen = false"
          class="w-full text-left px-4 py-3 rounded-xl text-base font-bold text-gray-700 hover:bg-[#E5EDF1] hover:text-[#1A365D] transition-colors flex items-center space-x-3">
          <span>👤</span> <span>Soy cliente</span>
        </button>
      </div>
    </div>
  </div>
</nav>
