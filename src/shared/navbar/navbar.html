<!-- Estrellas espaciales para el navbar -->
<style>
    @keyframes twinkle-nav {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }

    .space-nav {
        background: #0F172A;
        position: sticky;
        top: 0;
        overflow: visible;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
    }

    .space-nav::before {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: 
            radial-gradient(1px 1px at 10% 20%, white, transparent),
            radial-gradient(1px 1px at 30% 60%, white, transparent),
            radial-gradient(1px 1px at 50% 30%, white, transparent),
            radial-gradient(1px 1px at 70% 80%, white, transparent),
            radial-gradient(2px 2px at 85% 40%, white, transparent),
            radial-gradient(1px 1px at 20% 90%, white, transparent),
            radial-gradient(1px 1px at 90% 10%, white, transparent),
            radial-gradient(1px 1px at 40% 50%, white, transparent),
            radial-gradient(2px 2px at 60% 70%, white, transparent),
            radial-gradient(1px 1px at 15% 40%, white, transparent),
            radial-gradient(1px 1px at 95% 60%, white, transparent),
            radial-gradient(1px 1px at 25% 75%, white, transparent);
        background-size: 100% 100%;
        animation: twinkle-nav 4s ease-in-out infinite;
        opacity: 0.8;
        pointer-events: none;
    }
</style>

<!-- Navbar -->
<nav class="space-nav bg-space-primary shadow-2xl shadow-cyan-500/10 sticky top-0 z-[1000] border-b border-cyan-500/20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    <div class="flex justify-between h-20">
      <div class="flex items-center space-x-8">
        <!-- Logo -->
        <div class="flex-shrink-0 flex items-center cursor-pointer" routerLink="/">
          <div class="bg-gradient-to-br from-cyan-400 to-blue-500 rounded-full p-2.5 shadow-lg shadow-cyan-400/50 ring-2 ring-cyan-400/30 hover:ring-cyan-400/60 transition-all">
            <svg class="h-7 w-7" viewBox="0 0 24 24" style="transform: rotate(-45deg);">
              <g fill="white">
                <!-- Cuerpo del cohete -->
                <ellipse cx="12" cy="12" rx="3" ry="7"/>
                <!-- Punta -->
                <ellipse cx="12" cy="5" rx="2" ry="3"/>
                <!-- Ventana -->
                <circle cx="12" cy="11" r="1.5" opacity="0.4"/>
                <!-- Aleta izquierda -->
                <path d="M9 15 L6 19 L9 18 Z"/>
                <!-- Aleta derecha -->
                <path d="M15 15 L18 19 L15 18 Z"/>
                <!-- Llama -->
                <ellipse cx="12" cy="20" rx="2" ry="2.5" opacity="0.6"/>
              </g>
            </svg>
          </div>
          <span class="ml-3 text-xl font-bold bg-gradient-to-r from-cyan-300 via-cyan-400 to-blue-400 bg-clip-text text-transparent hidden sm:block drop-shadow-[0_0_8px_rgba(34,211,238,0.5)]">Espacio Online</span>
        </div>

        <!-- Desktop Menu -->
        <div class="hidden md:flex items-center space-x-8">
          <a routerLink="/" routerLinkActive="text-cyan-400 border-b-2 border-cyan-400 shadow-[0_2px_8px_rgba(34,211,238,0.4)]"
            [routerLinkActiveOptions]="{exact: true}"
            class="text-gray-300 hover:text-cyan-400 font-semibold transition-all py-2">Inicio</a>
          <a routerLink="/negocios" routerLinkActive="text-cyan-400 border-b-2 border-cyan-400 shadow-[0_2px_8px_rgba(34,211,238,0.4)]"
            class="text-gray-300 hover:text-cyan-400 font-semibold transition-all py-2">Negocios</a>
          <a routerLink="/servicios" routerLinkActive="text-cyan-400 border-b-2 border-cyan-400 shadow-[0_2px_8px_rgba(34,211,238,0.4)]"
            class="text-gray-300 hover:text-cyan-400 font-semibold transition-all py-2">Servicios</a>
          <a routerLink="/inmueble" routerLinkActive="text-cyan-400 border-b-2 border-cyan-400 shadow-[0_2px_8px_rgba(34,211,238,0.4)]"
            class="text-gray-300 hover:text-cyan-400 font-semibold transition-all py-2">Inmuebles</a>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex items-center space-x-4">
        <div class="relative hidden sm:block">
          <button
            class="bg-gradient-to-r from-space-secondary-from to-space-secondary-to hover:from-cyan-400 hover:to-blue-500 transition-all text-white font-bold px-6 py-2.5 rounded-full shadow-lg shadow-cyan-500/50 hover:shadow-cyan-400/70 flex items-center space-x-2 ring-2 ring-cyan-400/30 hover:ring-cyan-400/50"
            (click)="toggleSubmenu()">
            <span>✨ Iniciar sesión</span>
            <svg class="w-4 h-4 transition-transform duration-200" [class.rotate-180]="isSubmenuOpen" fill="none"
              stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </button>

          <!-- Dropdown Registrar -->
          <div *ngIf="isSubmenuOpen"
            class="absolute right-0 mt-3 w-56 bg-gradient-to-br from-gray-900 to-gray-800 rounded-2xl shadow-2xl shadow-cyan-500/30 z-[9999] py-2 border-2 border-cyan-500/30 animate-in fade-in slide-in-from-top-2 duration-200">
            <button
              class="w-full text-left px-5 py-3 text-sm text-gray-300 hover:bg-cyan-500/20 hover:text-cyan-400 transition-colors flex items-center space-x-3 rounded-xl mx-1"
              (click)="navigateToRegistro('empresa')">
              <span class="text-xl">💼</span>
              <div class="flex flex-col">
                <span class="font-bold">Soy empresa</span>
                <span class="text-xs text-gray-500">Registra tu negocio</span>
              </div>
            </button>
            <button
              class="w-full text-left px-5 py-3 text-sm text-gray-300 hover:bg-cyan-500/20 hover:text-cyan-400 transition-colors flex items-center space-x-3 rounded-xl mx-1"
              (click)="navigateToRegistro('cliente')">
              <span class="text-xl">🚀</span>
              <div class="flex flex-col">
                <span class="font-bold">Soy cliente</span>
                <span class="text-xs text-gray-500">Busca servicios</span>
              </div>
            </button>
          </div>
        </div>

        <!-- Mobile menu button -->
        <div class="md:hidden flex items-center">
          <button (click)="toggleMenu()" class="text-cyan-400 p-2 rounded-lg hover:bg-cyan-500/20 transition-colors">
            <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path *ngIf="!isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16" />
              <path *ngIf="isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div *ngIf="isMenuOpen" class="md:hidden bg-gradient-to-b from-gray-900 to-gray-800 border-t border-cyan-500/20 animate-in slide-in-from-top duration-300">
    <div class="px-4 pt-2 pb-6 space-y-2">
      <a routerLink="/" (click)="isMenuOpen = false"
        class="block px-4 py-3 rounded-xl text-base font-bold text-gray-300 hover:bg-cyan-500/20 hover:text-cyan-400 transition-colors">Inicio</a>
      <a routerLink="/negocios" (click)="isMenuOpen = false"
        class="block px-4 py-3 rounded-xl text-base font-bold text-gray-300 hover:bg-cyan-500/20 hover:text-cyan-400 transition-colors">Negocios</a>
      <a routerLink="/servicios" (click)="isMenuOpen = false"
        class="block px-4 py-3 rounded-xl text-base font-bold text-gray-300 hover:bg-cyan-500/20 hover:text-cyan-400 transition-colors">Servicios</a>
      <a routerLink="/inmueble" (click)="isMenuOpen = false"
        class="block px-4 py-3 rounded-xl text-base font-bold text-gray-300 hover:bg-cyan-500/20 hover:text-cyan-400 transition-colors">Inmuebles</a>

      <div class="pt-4 border-t border-cyan-500/20 mt-4">
        <p class="px-4 text-xs font-bold text-cyan-500 uppercase tracking-widest mb-2">✨ Registrar</p>
        <button (click)="navigateToRegistro('empresa'); isMenuOpen = false"
          class="w-full text-left px-4 py-3 rounded-xl text-base font-bold text-gray-300 hover:bg-cyan-500/20 hover:text-cyan-400 transition-colors flex items-center space-x-3">
          <span>💼</span> <span>Soy empresa</span>
        </button>
        <button (click)="navigateToRegistro('cliente'); isMenuOpen = false"
          class="w-full text-left px-4 py-3 rounded-xl text-base font-bold text-gray-300 hover:bg-cyan-500/20 hover:text-cyan-400 transition-colors flex items-center space-x-3">
          <span>🚀</span> <span>Soy cliente</span>
        </button>
      </div>
    </div>
  </div>
</nav>
