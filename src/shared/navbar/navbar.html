<!-- Barra superior anuncio -->
<div class="bg-blue-700 text-white font-bold p-2 text-center text-sm md:text-base">
  <span class="mx-2">🔈 ¿Tienes un negocio? ¡Regístrate <a class="text-cyan-200" routerLink="/registro-negocio">Aqui!</a></span>
</div>

<!-- Navbar -->

>

    <!-- Logo dentro de un círculo negro y duplicado en uno azul -->
    <div class="flex items-center space-x-3">
      <div class="bg-blue-600 rounded-full p-1">
        <img routerLink="/" src="/assets/logo.png" alt="Pedidos Barrio" class="h-10 w-10 rounded-full object-cover" />
      </div>
    </div>

    <ul class="hidden md:flex space-x-10 font-semibold text-black">
      <li routerLink="/" class="hover:text-cyan-600 cursor-pointer transition">Inicio</li>
      <li routerLink="/company" class="hover:text-cyan-600 cursor-pointer transition">
        Todos los servicios
      </li>
      <li routerLink="/inmueble" class="hover:text-cyan-600 cursor-pointer transition">Inmuebles</li>

    </ul>
  </div>

  <button
    class="bg-cyan-500 hover:bg-cyan-600 transition text-white font-bold px-5 py-2 rounded shadow"
  (click)="goToRegistro()">
    + Registrar Negocio
  </button>
</nav>
