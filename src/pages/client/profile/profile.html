<div class="profile-container w-full max-w-6xl mx-auto p-4 md:p-6 fade-in">
    
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Mi Perfil</h1>
        <button pButton label="Cerrar Sesión" icon="pi pi-power-off" class="p-button-danger p-button-outlined" (click)="authService.logout()"></button>
    </div>

    <p-tabs [(value)]="activeTabIndex">
        <p-tablist>
            <p-tab [value]="0">
                <i class="pi pi-user mr-2"></i>
                Datos Personales
            </p-tab>
            <p-tab [value]="1">
                <i class="pi pi-map-marker mr-2"></i>
                Mis Direcciones
            </p-tab>
        </p-tablist>
        
        <p-tabpanels>
            <!-- Tab 1: Personal Info -->
            <p-tabpanel [value]="0">
                <div class="p-4 bg-white rounded-lg shadow-sm border border-gray-100">
                    <form [formGroup]="profileForm" (ngSubmit)="saveProfile()" class="grid grid-cols-1 md:grid-cols-2 gap-6">

                        <div class="field">
                            <label for="fullName" class="block font-medium mb-2 text-gray-700">Nombre Completo</label>
                            <input pInputText id="fullName" formControlName="fullName" class="w-full" placeholder="Tu nombre completo" />
                        </div>

                        <div class="field">
                            <label for="email" class="block font-medium mb-2 text-gray-700">Correo Electrónico</label>
                            <input pInputText id="email" formControlName="email" class="w-full bg-gray-50" readonly />
                            <small class="text-gray-500">El correo no se puede cambiar.</small>
                        </div>

                        <div class="field">
                            <label for="phone" class="block font-medium mb-2 text-gray-700">Teléfono / Celular</label>
                            <input pInputText id="phone" formControlName="phone" class="w-full" placeholder="+51 999 999 999" />
                        </div>

                        <div class="col-span-1 md:col-span-2 flex justify-end mt-4">
                            <button pButton type="submit" label="Guardar Cambios" icon="pi pi-check" [loading]="isLoading()" class="p-button-primary"></button>
                        </div>

                    </form>
                </div>
            </p-tabpanel>

            <!-- Tab 2: Addresses -->
            <p-tabpanel [value]="1">
                <div class="p-4">
                    
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold text-gray-700">Direcciones Guardadas</h3>
                        <button pButton label="Nueva Dirección" icon="pi pi-plus" (click)="openNewAddress()" class="p-button-success"></button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <div *ngFor="let addr of addresses()" class="address-card p-4 border rounded-lg bg-white shadow-sm hover:shadow-md transition-shadow relative">
                            <div class="absolute top-2 right-2 flex gap-2">
                                <button pButton icon="pi pi-pencil" class="p-button-rounded p-button-text p-button-secondary p-button-sm" (click)="editAddress(addr)"></button>
                                <button pButton icon="pi pi-trash" class="p-button-rounded p-button-text p-button-danger p-button-sm" (click)="deleteAddress(addr.id)"></button>
                            </div>
                            
                            <div class="flex items-center gap-2 mb-2">
                                <i class="pi" [class.pi-home]="addr.nombre.toLowerCase().includes('casa')" 
                                   [class.pi-briefcase]="addr.nombre.toLowerCase().includes('oficina')"
                                   [class.pi-map-marker]="!addr.nombre.toLowerCase().includes('casa') && !addr.nombre.toLowerCase().includes('oficina')"></i>
                                <span class="font-bold text-gray-800">{{ addr.nombre }}</span>
                                <span *ngIf="addr.esPrincipal" class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded-full">Principal</span>
                            </div>
                            
                            <p class="text-gray-600 text-sm mb-1 line-clamp-2" title="{{ addr.direccion }}">{{ addr.direccion }}</p>
                            <p class="text-gray-400 text-xs">{{ addr.referencia || 'Sin referencia' }}</p>
                        </div>

                        <div *ngIf="addresses().length === 0" class="col-span-full py-8 text-center text-gray-500 bg-gray-50 rounded-lg border-dashed border-2 border-gray-200">
                            <i class="pi pi-map text-4xl mb-2 text-gray-300"></i>
                            <p>No tienes direcciones guardadas.</p>
                            <button pButton label="Agregar la primera" class="p-button-link" (click)="openNewAddress()"></button>
                        </div>
                    </div>

                </div>
            </p-tabpanel>
        </p-tabpanels>
    </p-tabs>

    <!-- Address Dialog -->
    <p-dialog [(visible)]="showAddressDialog" [header]="isEditingAddress() ? 'Editar Dirección' : 'Nueva Dirección'" [modal]="true" [style]="{width: '90vw', maxWidth: '800px'}" [draggable]="false" [resizable]="false">
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 pt-2">
            
            <!-- Left: Form -->
            <div class="space-y-4">
                
                <div class="field">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre (Alias)</label>
                    <input pInputText [(ngModel)]="addrName" placeholder="Ej: Casa, Trabajo" class="w-full" />
                </div>

                <div class="field">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Dirección Exacta</label>
                    <textarea pInputTextarea [(ngModel)]="addrLine" rows="2" placeholder="Av. Principal 123..." class="w-full resize-none border-gray-300 rounded-md"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-2">
                     <div class="field">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Departamento</label>
                        <select [(ngModel)]="addrDept" (change)="onDepartmentChange()" class="w-full p-2 border border-gray-300 rounded-md bg-white">
                            <option value="">Seleccione</option>
                            <option *ngFor="let d of departments()" [value]="d.code">{{ d.name }}</option>
                        </select>
                    </div>
                     <div class="field">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Provincia</label>
                        <select [(ngModel)]="addrProv" (change)="onProvinceChange()" class="w-full p-2 border border-gray-300 rounded-md bg-white" [disabled]="!addrDept()">
                            <option value="">Seleccione</option>
                            <option *ngFor="let p of provinces()" [value]="p.code">{{ p.name }}</option>
                        </select>
                    </div>
                </div>
                 <div class="field">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Distrito</label>
                    <select [(ngModel)]="addrDist" class="w-full p-2 border border-gray-300 rounded-md bg-white" [disabled]="!addrProv()">
                        <option value="">Seleccione</option>
                        <option *ngFor="let d of districts()" [value]="d.code">{{ d.name }}</option>
                    </select>
                </div>

                <div class="field">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Referencia (Opcional)</label>
                    <input pInputText [(ngModel)]="addrRef" placeholder="Frente al parque..." class="w-full" />
                </div>

                <div class="field-checkbox flex items-center gap-2 mt-2">
                    <p-checkbox [(ngModel)]="addrIsMain" [binary]="true" inputId="binary"></p-checkbox>
                    <label for="binary" class="text-sm text-gray-700 cursor-pointer select-none">Esta es mi dirección principal</label>
                </div>

            </div>

            <!-- Right: Map -->
            <div class="h-full min-h-[300px] relative rounded-lg overflow-hidden border border-gray-300">
                <div id="addressMap" class="w-full h-full absolute inset-0 z-0"></div>
                <div class="absolute top-2 left-2 right-2 z-[1000] bg-white/90 p-2 rounded text-xs text-center shadow">
                    Arrastra el marcador para ajustar la ubicación
                </div>
            </div>

        </div>

        <ng-template pTemplate="footer">
            <button pButton label="Cancelar" icon="pi pi-times" (click)="showAddressDialog.set(false)" class="p-button-text text-gray-600"></button>
            <button pButton label="Guardar Dirección" icon="pi pi-check" (click)="saveAddress()" class="p-button-primary" [disabled]="!addrLine()"></button>
        </ng-template>

    </p-dialog>

</div>
