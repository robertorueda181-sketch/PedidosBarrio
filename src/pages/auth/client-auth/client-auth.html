<div class="flex min-h-screen items-center justify-center bg-[var(--secondary-color)] relative overflow-hidden p-4">
    <div class="relative z-10 w-full max-w-sm md:max-w-md p-8 rounded-2xl bg-white shadow-xl text-slate-800">
        
        <h2 class="text-3xl font-bold mb-2 text-center text-slate-800 tracking-[0.2em] uppercase">
            {{ activeTabIndex() === 0 ? 'Login' : 'Registro' }}
        </h2>
        <p class="text-center text-slate-500 mb-8 text-sm font-light">Bienvenido a PedidosBarrio</p>
        
        <div class="flex justify-center gap-4 mb-8">
            <button (click)="toggleTab(0)" 
                class="px-6 py-2 rounded-full text-sm font-medium transition-all duration-300"
                [ngClass]="activeTabIndex() === 0 ? 'bg-cyan-500 text-white shadow-lg shadow-cyan-500/30' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-700'">
                Ingresar
            </button>
            <button (click)="toggleTab(1)" 
                class="px-6 py-2 rounded-full text-sm font-medium transition-all duration-300"
                [ngClass]="activeTabIndex() === 1 ? 'bg-cyan-500 text-white shadow-lg shadow-cyan-500/30' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-700'">
                Registrarse
            </button>
        </div>

        <!-- Social Login (Compact) -->
        <div class="mb-8 flex justify-center w-full">
            <div class="w-full flex justify-center">
                <asl-google-signin-button type="standard" size="large" text="signin_with" shape="pill" theme="outline" class="w-full flex justify-center"></asl-google-signin-button>
            </div>
        </div>

        <!-- LOGIN FORM -->
        <form [formGroup]="loginForm" (ngSubmit)="onLogin()" *ngIf="activeTabIndex() === 0" class="space-y-6">
            <div class="relative z-0 w-full group">
                <input pInputText formControlName="email" type="email" 
                    class="block py-2.5 px-0 w-full text-sm text-slate-900 bg-transparent border-0 border-b-2 border-slate-300 appearance-none focus:outline-none focus:ring-0 focus:border-cyan-500 peer !shadow-none !rounded-none" 
                    placeholder=" " />
                <label class="peer-focus:font-medium absolute text-sm text-slate-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-cyan-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                    Email
                </label>
                <i class="pi pi-envelope absolute right-0 top-3 text-slate-400"></i>
            </div>
            
            <div class="relative z-0 w-full group">
                <input pInputText formControlName="password" type="password" 
                    class="block py-2.5 px-0 w-full text-sm text-slate-900 bg-transparent border-0 border-b-2 border-slate-300 appearance-none focus:outline-none focus:ring-0 focus:border-cyan-500 peer !shadow-none !rounded-none" 
                    placeholder=" " />
                <label class="peer-focus:font-medium absolute text-sm text-slate-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-cyan-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                    Contraseña
                </label>
                <i class="pi pi-lock absolute right-0 top-3 text-slate-400"></i>
            </div>

            <div class="flex justify-between items-center text-sm mt-2">
                <div class="flex items-center gap-2">
                    <p-checkbox [binary]="true" inputId="remember" styleClass="small-checkbox-light"></p-checkbox>
                    <label for="remember" class="text-slate-600 text-xs">Recuérdame</label>
                </div>
                <a routerLink="/forgot-password" class="text-cyan-600 hover:text-cyan-800 text-xs transition-colors font-semibold">¿Olvidaste pass?</a>
            </div>

            <button pButton type="submit" label="LOGIN" class="w-full !bg-cyan-500 hover:!bg-cyan-600 !text-white !border-none !py-3 !font-bold !tracking-widest !rounded-lg shadow-lg hover:shadow-cyan-500/40 transition-all transform hover:-translate-y-1" [loading]="isLoading()"></button>
            
            <div class="mt-4 text-center">
                <span class="text-slate-500 text-xs">¿No tienes cuenta? </span>
                <a (click)="toggleTab(1)" class="text-cyan-600 font-bold cursor-pointer hover:underline text-xs">Regístrate</a>
            </div>
        </form>

        <!-- REGISTER FORM -->
        <form [formGroup]="registerForm" (ngSubmit)="onRegister()" *ngIf="activeTabIndex() === 1" class="space-y-6">
            
            <div class="relative z-0 w-full group">
                <input formControlName="email" type="email" 
                    class="block py-2.5 px-0 w-full text-sm text-slate-900 bg-transparent border-0 border-b-2 border-slate-300 appearance-none focus:outline-none focus:ring-0 focus:border-cyan-500 peer rounded-none shadow-none" 
                    placeholder=" " />
                <label class="peer-focus:font-medium absolute text-sm text-slate-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-cyan-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                    Email
                </label>
                <i class="pi pi-envelope absolute right-0 top-3 text-slate-400"></i>
            </div>

            <div class="relative z-0 w-full group">
                <input formControlName="password" type="password" 
                    class="block py-2.5 px-0 w-full text-sm text-slate-900 bg-transparent border-0 border-b-2 border-slate-300 appearance-none focus:outline-none focus:ring-0 focus:border-cyan-500 peer rounded-none shadow-none" 
                    placeholder=" " />
                <label class="peer-focus:font-medium absolute text-sm text-slate-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-cyan-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                    Contraseña
                </label>
                <i class="pi pi-lock absolute right-0 top-3 text-slate-400"></i>
            </div>

            <div class="relative z-0 w-full group">
                <input formControlName="confirmPassword" type="password" 
                    class="block py-2.5 px-0 w-full text-sm text-slate-900 bg-transparent border-0 border-b-2 border-slate-300 appearance-none focus:outline-none focus:ring-0 focus:border-cyan-500 peer rounded-none shadow-none" 
                    placeholder=" " />
                <label class="peer-focus:font-medium absolute text-sm text-slate-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-cyan-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                    Confirmar
                </label>
                <i class="pi pi-check-circle absolute right-0 top-3 text-slate-400"></i>
            </div>
            
            <div class="relative z-0 w-full group">
                <input formControlName="dni" type="text" maxlength="8"
                    class="block py-2.5 px-0 w-full text-sm text-slate-900 bg-transparent border-0 border-b-2 border-slate-300 appearance-none focus:outline-none focus:ring-0 focus:border-cyan-500 peer rounded-none shadow-none" 
                    placeholder=" " />
                <label class="peer-focus:font-medium absolute text-sm text-slate-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-cyan-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                    DNI
                </label>
                <i class="pi pi-id-card absolute right-0 top-3 text-slate-400"></i>
            </div>

            <div class="relative z-0 w-full group">
                <input formControlName="nombres" type="text" 
                    class="block py-2.5 px-0 w-full text-sm text-slate-900 bg-transparent border-0 border-b-2 border-slate-300 appearance-none focus:outline-none focus:ring-0 focus:border-cyan-500 peer rounded-none shadow-none" 
                    placeholder=" " />
                <label class="peer-focus:font-medium absolute text-sm text-slate-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-cyan-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                    Nombres
                </label>
                <i class="pi pi-user absolute right-0 top-3 text-slate-400"></i>
            </div>

            <div class="relative z-0 w-full group">
                <input formControlName="telefono" type="text" maxlength="9"
                    class="block py-2.5 px-0 w-full text-sm text-slate-900 bg-transparent border-0 border-b-2 border-slate-300 appearance-none focus:outline-none focus:ring-0 focus:border-cyan-500 peer rounded-none shadow-none" 
                    placeholder=" " />
                <label class="peer-focus:font-medium absolute text-sm text-slate-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-cyan-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                    Teléfono
                </label>
                <i class="pi pi-phone absolute right-0 top-3 text-slate-400"></i>
            </div>

            <div class="flex items-center gap-2 my-4">
                <p-checkbox formControlName="terms" [binary]="true" inputId="terms" styleClass="small-checkbox-light"></p-checkbox>
                <label for="terms" class="text-xs text-slate-600">Acepto términos</label>
            </div>

            <button pButton type="submit" label="REGISTRAR" class="w-full !bg-cyan-500 hover:!bg-cyan-600 !text-white !border-none !py-3 !font-bold !tracking-widest !rounded-lg shadow-lg hover:shadow-cyan-500/40 transition-all transform hover:-translate-y-1" [loading]="isLoading()" [disabled]="registerForm.invalid"></button>
        </form>

    </div>
</div>
