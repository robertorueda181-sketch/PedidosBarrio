<div class="min-h-screen bg-[#F3F4F6] flex items-center justify-center p-6 md:p-12">
    <div class="max-w-6xl w-full">
        <div class="mb-12 text-center">
            <h1 class="text-4xl md:text-5xl font-black text-gray-900 mb-4 tracking-tight">Bienvenido, comencemos</h1>
            <p class="text-gray-500 text-lg md:text-xl max-w-2xl mx-auto font-medium">Selecciona el tipo de perfil que
                deseas gestionar para configurar tu panel.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Negocio -->
            <button (click)="selectType('NEGOCIO')"
                class="group bg-white p-10 rounded-[2.5rem] shadow-xl hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 border-2 border-transparent hover:border-black text-left flex flex-col items-start gap-6">
                <div
                    class="w-16 h-16 bg-gray-50 rounded-2xl flex items-center justify-center text-black group-hover:bg-black group-hover:text-white transition-all duration-500">
                    <i class="pi pi-shop text-3xl"></i>
                </div>
                <div>
                    <h3 class="text-2xl font-black text-gray-900 mb-3 tracking-tight">Negocio</h3>
                    <p class="text-gray-500 text-sm leading-relaxed font-medium">Para tiendas, restaurantes, bodegas y
                        cualquier venta directa de productos locales.</p>
                </div>
                <div
                    class="mt-4 flex items-center text-xs font-black uppercase tracking-widest text-gray-300 group-hover:text-black transition-colors">
                    Seleccionar <i class="pi pi-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
                </div>
            </button>

            <!-- Servicio -->
            <button (click)="selectType('SERVICIO')"
                class="group bg-white p-10 rounded-[2.5rem] shadow-xl hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 border-2 border-transparent hover:border-black text-left flex flex-col items-start gap-6">
                <div
                    class="w-16 h-16 bg-gray-50 rounded-2xl flex items-center justify-center text-black group-hover:bg-black group-hover:text-white transition-all duration-500">
                    <i class="pi pi-briefcase text-3xl"></i>
                </div>
                <div>
                    <h3 class="text-2xl font-black text-gray-900 mb-3 tracking-tight">Servicio</h3>
                    <p class="text-gray-500 text-sm leading-relaxed font-medium">Ideal para técnicos, oficios y
                        profesionales que ofrecen sus habilidades a domicilio.</p>
                </div>
                <div
                    class="mt-4 flex items-center text-xs font-black uppercase tracking-widest text-gray-300 group-hover:text-black transition-colors">
                    Seleccionar <i class="pi pi-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
                </div>
            </button>

            <!-- Inmueble -->
            <button (click)="selectType('INMUEBLE')"
                class="group bg-white p-10 rounded-[2.5rem] shadow-xl hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 border-2 border-transparent hover:border-black text-left flex flex-col items-start gap-6">
                <div
                    class="w-16 h-16 bg-gray-50 rounded-2xl flex items-center justify-center text-black group-hover:bg-black group-hover:text-white transition-all duration-500">
                    <i class="pi pi-home text-3xl"></i>
                </div>
                <div>
                    <h3 class="text-2xl font-black text-gray-900 mb-3 tracking-tight">Inmueble</h3>
                    <p class="text-gray-500 text-sm leading-relaxed font-medium">Publica propiedades para venta o
                        alquiler, gestiona casas, terrenos y locales comerciales.</p>
                </div>
                <div
                    class="mt-4 flex items-center text-xs font-black uppercase tracking-widest text-gray-300 group-hover:text-black transition-colors">
                    Seleccionar <i class="pi pi-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
                </div>
            </button>
        </div>

        <div class="mt-16 text-center">
            <button routerLink="/"
                class="text-sm font-bold text-gray-400 hover:text-black transition-colors flex items-center justify-center gap-2 mx-auto">
                <i class="pi pi-arrow-left"></i> Volver al Inicio
            </button>
        </div>
    </div>
</div>
