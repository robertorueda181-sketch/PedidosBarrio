<div class="max-w-xl mx-auto bg-white p-8 rounded-xl shadow-lg mt-12 mb-16">
  <h2 class="text-3xl font-extrabold text-cyan-700 mb-8 text-center">
    Registro de Negocio
  </h2>

  <!-- Pasos del formulario -->
  <div class="mb-6 flex justify-center space-x-6 text-sm font-semibold text-gray-600">
    <div
      [class.text-cyan-600]="step === 1"
      class="cursor-pointer border-b-2 border-transparent hover:border-cyan-600 duration-200"
    >
      1. Selecciona tu plan
    </div>
    <div
      [class.text-cyan-600]="step === 2"
      class="cursor-pointer border-b-2 border-transparent hover:border-cyan-600 duration-200"
      [class.pointer-events-none]="step === 1"
    >
      2. Completa tus datos
    </div>
  </div>

  <!-- Step 1: Selección de Plan -->
  <form  (ngSubmit)="goToStep2()" class="space-y-6">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
      <label
        class="cursor-pointer border rounded-xl p-6 text-center hover:shadow-lg transition duration-200 relative"
        [class.border-cyan-600]="selectedPlan === '15'"
        [class.shadow-lg]="selectedPlan === '15'"
      >
        <input
          type="radio"
          name="plan"
          value="15"
          class="hidden"
          required
        />
        <div class="text-xl font-bold text-cyan-700 mb-2">Plan Básico</div>
        <div class="text-lg font-semibold">S/ 15</div>
        <div class="text-sm text-gray-600 mt-2">
          Ideal para comenzar con tu negocio.
        </div>
      </label>

      <label
        class="cursor-pointer border rounded-xl p-6 text-center hover:shadow-lg transition duration-200 relative"
        [class.border-cyan-600]="selectedPlan === '25'"
        [class.shadow-lg]="selectedPlan === '25'"
      >
        <input
          type="radio"
          name="plan"
          value="25"
          class="hidden"
          required
        />
        <div class="text-xl font-bold text-cyan-700 mb-2">Plan Premium</div>
        <div class="text-lg font-semibold">S/ 25</div>
        <div class="text-sm text-gray-600 mt-2">
          Máximo alcance y promociones destacadas.
        </div>
      </label>

      <label
        class="cursor-pointer border rounded-xl p-6 text-center hover:shadow-lg transition duration-200 relative"
        [class.border-cyan-600]="selectedPlan === 'prueba'"
        [class.shadow-lg]="selectedPlan === 'prueba'"
      >
        <input
          type="radio"
          name="plan"
          value="prueba"
          class="hidden"
          required
        />
        <div class="text-xl font-bold text-cyan-700 mb-2">Prueba Gratis</div>
        <div class="text-lg font-semibold">0 soles</div>
        <div class="text-sm text-gray-600 mt-2">
          Prueba sin compromiso por 7 días.
        </div>
      </label>
    </div>

    <div class="flex justify-end">
      <button
        type="submit"
        class="bg-cyan-600 hover:bg-cyan-700 text-white font-semibold px-6 py-2 rounded shadow"
        [disabled]="!selectedPlan"
      >
        Siguiente
      </button>
    </div>
  </form>

  <!-- Step 2: Datos del Negocio -->
  <form
    (ngSubmit)="onSubmit()"
    class="space-y-6"
  >
    <div>
      <label class="block mb-1 font-semibold text-black" for="fullname">Nombre Completo *</label>
      <input
        type="text"
        id="fullname"
        name="fullname"
        required
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:border-cyan-600 focus:ring-1 focus:ring-cyan-600"
      />
    </div>

    <div>
      <label class="block mb-1 font-semibold text-black" for="businessName">Nombre del Negocio *</label>
      <input
        type="text"
        id="businessName"
        name="businessName"

        required
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:border-cyan-600 focus:ring-1 focus:ring-cyan-600"
      />
    </div>

    <div>
      <label class="block mb-1 font-semibold text-black" for="category">Categoría *</label>
      <select
        id="category"
        name="category"
        required
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:border-cyan-600 focus:ring-1 focus:ring-cyan-600"
      >
        <option value="" disabled selected>Selecciona una categoría</option>
        <option>Comida</option>
        <option>Abarrotes</option>
        <option>Lavandería</option>
        <option>Panadería</option>
        <option>Inmuebles</option>
        <option>Otros</option>
      </select>
    </div>

    <div>
      <label class="block mb-1 font-semibold text-black" for="schedule">Horario *</label>
      <input
        type="text"
        id="schedule"
        name="schedule"
        placeholder="Ejemplo: Lun-Vie 9am - 6pm"

        required
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:border-cyan-600 focus:ring-1 focus:ring-cyan-600"
      />
    </div>

    <div>
      <label class="block mb-1 font-semibold text-black" for="address">Dirección *</label>
      <input
        type="text"
        id="address"
        name="address"

        required
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:border-cyan-600 focus:ring-1 focus:ring-cyan-600"
      />
    </div>

    <div>
      <label class="block mb-1 font-semibold text-black" for="phone">Teléfono *</label>
      <input
        type="tel"
        id="phone"
        name="phone"
        placeholder="Ejemplo: +511912345678"
        pattern="^\+?[0-9\s\-]{7,15}$"

        required
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:border-cyan-600 focus:ring-1 focus:ring-cyan-600"
      />
    </div>

    <div>
      <label class="block mb-1 font-semibold text-black" for="email">Correo Electrónico *</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="correo@ejemplo.com"

        required
        email
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:border-cyan-600 focus:ring-1 focus:ring-cyan-600"
      />
    </div>

    <div>
      <label class="block mb-1 font-semibold text-black" for="description">Descripción (opcional)</label>
      <textarea
        id="description"
        name="description"
        rows="3"

        placeholder="Una breve descripción de tu negocio"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:border-cyan-600 focus:ring-1 focus:ring-cyan-600 resize-none"
      ></textarea>
    </div>

    <div class="flex justify-between">
      <button
        type="button"
        (click)="step = 1"
        class="bg-gray-300 hover:bg-gray-400 transition text-black font-semibold px-5 py-2 rounded shadow"
      >
        Volver
      </button>
      <button
        type="submit"

        class="bg-cyan-600 hover:bg-cyan-700 transition text-white font-semibold px-5 py-2 rounded shadow"
      >
        Registrar
      </button>
    </div>
  </form>
</div>
